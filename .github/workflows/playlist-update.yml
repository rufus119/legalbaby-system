name: Playlist Update - Midnight Daily

on:
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  update-playlists:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run playlist updates
        run: node index-v4.js --now
      
      - name: Log completion
        if: success()
        run: echo "✓ Playlists updated successfully at $(date)"
      
      - name: Log failure
        if: failure()
        run: echo "✗ Playlist update failed" && exit 1
