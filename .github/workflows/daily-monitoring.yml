name: Daily Top 100 Monitoring

on:
  schedule:
    # Daily at 8:30 AM UTC (= 9:30 AM WAT / after Apple's midnight Pacific refresh)
    - cron: '30 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install
      
      - name: Install Playwright browsers
        run: npx playwright install chromium
      
      - name: Run daily monitoring
        run: node index-v4.js --now
      
      - name: Commit reports
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/snapshots/daily data/reports/daily
          git commit -m "Daily monitoring report - $(date +'%Y-%m-%d')" || true
          git push
