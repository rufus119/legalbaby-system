name: Weekly Genre Analysis

on:
  schedule:
    # Every Saturday at 8:30 AM UTC (= 9:30 AM WAT / after Apple midnight PT refresh)
    - cron: '30 8 * * 6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: npm install
      
      - name: Install Playwright browsers
        run: npx playwright install chromium
      
      - name: Run weekly genre analysis
        run: node index-v4.js --weekly
      
      - name: Commit reports
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/snapshots/weekly data/reports/weekly
          git commit -m "Weekly genre analysis - Week of $(date +'%Y-%m-%d')" || true
          git push

